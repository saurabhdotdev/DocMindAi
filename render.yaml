services:
  # API Gateway - Node.js / Express
  - type: web
    name: docmind-api-gateway
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false          # Paste from Supabase
      - key: REDIS_URL
        sync: false          # Paste from Upstash
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: AWS_ACCESS_KEY_ID
        sync: false          # From Cloudflare R2
      - key: AWS_SECRET_ACCESS_KEY
        sync: false          # From Cloudflare R2
      - key: AWS_REGION
        value: auto
      - key: S3_BUCKET_NAME
        value: docmind-uploads
      - key: S3_ENDPOINT
        sync: false          # From Cloudflare R2
      - key: S3_FORCE_PATH_STYLE
        value: true
      - key: AI_SERVICE_URL
        value: https://docmind-ai-service.onrender.com

  # AI Service - Python / FastAPI
  - type: web
    name: docmind-ai-service
    runtime: docker
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
