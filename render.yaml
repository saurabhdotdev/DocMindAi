services:
  # API Gateway - Node.js / Express
  - type: web
    name: docmind-api-gateway
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false          # Paste from Supabase
      - key: REDIS_URL
        sync: false          # Paste from Upstash
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: SUPABASE_URL
        sync: false          # https://ghcngrvcotrotjnaptgr.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false          # From Supabase Settings > API > service_role secret
      - key: S3_BUCKET_NAME
        value: docmind-uploads
      - key: AI_SERVICE_URL
        value: https://docmind-ai-service.onrender.com
      - key: GROQ_API_KEY
        sync: false

  # AI Service - Python / FastAPI
  - type: web
    name: docmind-ai-service
    runtime: docker
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
