services:
  # API Gateway - Node.js / Express
  - type: web
    name: docmind-api-gateway
    runtime: docker
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: docmind-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: docmind-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET_NAME
        value: docmind-uploads
      - key: S3_ENDPOINT
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: false
      - key: QDRANT_URL
        value: http://localhost:6333
      - key: AI_SERVICE_URL
        value: http://localhost:8000

  # AI Service - Python / FastAPI
  - type: web
    name: docmind-ai-service
    runtime: docker
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000

databases:
  # PostgreSQL
  - name: docmind-postgres
    plan: free
    databaseName: docmind
    user: postgres

  # Redis
  - name: docmind-redis
    plan: free
